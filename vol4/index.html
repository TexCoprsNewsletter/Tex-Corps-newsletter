<script>
function positionLinks(){
    const img = document.getElementById("newsletterImg");
    const links = document.querySelectorAll(".link-area");

    const imgWidth = img.clientWidth;
    const imgHeight = img.clientHeight;

    links.forEach(link => {
        const left = parseFloat(link.dataset.left);
        const top = parseFloat(link.dataset.top);
        const width = parseFloat(link.dataset.width);
        const height = parseFloat(link.dataset.height);

        link.style.left = (imgWidth * left / 100) + "px";
        link.style.top = (imgHeight * top / 100) + "px";
        link.style.width = (imgWidth * width / 100) + "px";
        link.style.height = (imgHeight * height / 100) + "px";
    });
}

window.addEventListener("load", positionLinks);
window.addEventListener("resize", positionLinks);

const img = document.getElementById("newsletterImg");
img.addEventListener("load", positionLinks);
</script>
