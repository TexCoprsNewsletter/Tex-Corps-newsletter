<script>
function positionLinks(){
    const img = document.getElementById("newsletterImg");
    const links = document.querySelectorAll(".link-area");

    const imgWidth = img.clientWidth;
    const imgHeight = img.clientHeight;

    links.forEach(link => {
        link.style.left = (imgWidth * parseFloat(link.dataset.left) / 100) + "px";
        link.style.top = (imgHeight * parseFloat(link.dataset.top) / 100) + "px";
        link.style.width = (imgWidth * parseFloat(link.dataset.width) / 100) + "px";
        link.style.height = (imgHeight * parseFloat(link.dataset.height) / 100) + "px";
    });
}

window.addEventListener("load", positionLinks);
window.addEventListener("resize", positionLinks);
document.getElementById("newsletterImg").addEventListener("load", positionLinks);
</script>
