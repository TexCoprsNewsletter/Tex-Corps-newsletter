<script>
const img = document.getElementById('newsletter');
const areas = document.querySelectorAll('area');
const originalWidth = 587;

areas.forEach(area => {
    area.dataset.coords = area.coords;
});

function resizeMap(){
    const ratio = img.clientWidth / originalWidth;

    areas.forEach(area => {
        const original = area.dataset.coords.split(',').map(Number);
        const scaled = original.map(v => Math.round(v * ratio));
        area.coords = scaled.join(',');
    });
}

window.addEventListener('load', resizeMap);
window.addEventListener('resize', resizeMap);
window.addEventListener('orientationchange', resizeMap);
img.addEventListener('load', resizeMap);
</script>
